<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sudoku Solver</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-6">

<h1 class="text-3xl font-bold mb-6">Sudoku Solver</h1>

<div id="board" class="grid grid-cols-9 gap-1"></div>

<button onclick="solveSudoku()" 
class="mt-6 px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-semibold">
Resolver
</button>

<div class="mt-8 w-full max-w-3xl">
  <h2 class="text-xl font-semibold mb-2">Passo a Passo</h2>
  <div id="steps" class="bg-gray-800 p-4 rounded-xl h-64 overflow-y-auto text-sm"></div>
</div>

<script>
const boardElement = document.getElementById("board");
const stepsElement = document.getElementById("steps");

let board = [];

// Criar grade
function createBoard() {
  for (let i = 0; i < 81; i++) {
    const input = document.createElement("input");
    input.type = "text";
    input.maxLength = "1";
    input.className = `
      w-12 h-12 text-center text-lg 
      bg-gray-800 border border-gray-700
      focus:outline-none focus:ring-2 focus:ring-blue-500
    `;
    boardElement.appendChild(input);
  }
}

function getBoard() {
  const inputs = boardElement.querySelectorAll("input");
  board = [];
  for (let i = 0; i < 9; i++) {
    board[i] = [];
    for (let j = 0; j < 9; j++) {
      const value = inputs[i * 9 + j].value;
      board[i][j] = value ? parseInt(value) : 0;
    }
  }
}

function setBoard() {
  const inputs = boardElement.querySelectorAll("input");
  for (let i = 0; i < 9; i++) {
    for (let j = 0; j < 9; j++) {
      inputs[i * 9 + j].value = board[i][j] !== 0 ? board[i][j] : "";
    }
  }
}

function isValid(num, row, col) {
  for (let i = 0; i < 9; i++) {
    if (board[row][i] === num) return false;
    if (board[i][col] === num) return false;
  }

  const boxRow = Math.floor(row / 3) * 3;
  const boxCol = Math.floor(col / 3) * 3;

  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < 3; j++) {
      if (board[boxRow + i][boxCol + j] === num) return false;
    }
  }

  return true;
}

function solve(row = 0, col = 0) {
  if (row === 9) return true;

  if (col === 9) return solve(row + 1, 0);

  if (board[row][col] !== 0) return solve(row, col + 1);

  for (let num = 1; num <= 9; num++) {
    if (isValid(num, row, col)) {
      board[row][col] = num;
      logStep(`Colocando ${num} em (${row+1},${col+1})`);

      if (solve(row, col + 1)) return true;

      board[row][col] = 0;
      logStep(`Removendo ${num} de (${row+1},${col+1})`);
    }
  }

  return false;
}

function logStep(text) {
  const p = document.createElement("div");
  p.textContent = text;
  stepsElement.appendChild(p);
  stepsElement.scrollTop = stepsElement.scrollHeight;
}

function solveSudoku() {
  stepsElement.innerHTML = "";
  getBoard();
  solve();
  setBoard();
}

createBoard();
</script>

</body>
</html>
